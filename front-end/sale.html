<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒杀系统 - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; }
        .header { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 20px 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .header h1 { color: #e4393c; font-size: 28px; }
        .banner { background: linear-gradient(135deg, #e4393c 0%, #ff6b6b 100%); color: #fff; padding: 60px 0; text-align: center; }
        .banner h2 { font-size: 48px; margin-bottom: 20px; }
        .banner p { font-size: 20px; opacity: 0.9; }
        .products { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .products h3 { font-size: 24px; margin-bottom: 20px; color: #333; }
        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .product-img { width: 100%; height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 48px; }
        .product-info { padding: 20px; }
        .product-name { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 10px; }
        .product-price { font-size: 24px; color: #e4393c; font-weight: 700; }
        .product-price del { font-size: 14px; color: #999; font-weight: 400; margin-left: 8px; }
        .seckill-tag { display: inline-block; background: #e4393c; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; }
        .btn-seckill { width: 100%; padding: 12px; background: #e4393c; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .btn-seckill:hover { background: #d32f2f; }
        .btn-seckill:disabled { background: #ccc; cursor: not-allowed; }
        .footer { background: #fff; padding: 30px 0; text-align: center; color: #666; margin-top: 60px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>秒杀系统</h1>
        </div>
    </div>

    <div class="banner">
        <div class="container">
            <h2>🔥 限时秒杀</h2>
            <p>热门商品超值优惠，仅限今日！</p>
        </div>
    </div>

    <div class="products">
        <div class="container">
            <h3>秒杀商品</h3>
            <div class="product-list">
                <div class="product-card">
                    <div class="product-img">📱</div>
                    <div class="product-info">
                        <span class="seckill-tag">10:00 开抢</span>
                        <div class="product-name">iPhone 15 Pro Max</div>
                        <div class="product-price">¥7999 <del>¥9999</del></div>
                        <button class="btn-seckill" onclick="seckill(1)">立即秒杀</button>
                    </div>
                </div>
                <div class="product-card">
                    <div class="product-img">💻</div>
                    <div class="product-info">
                        <span class="seckill-tag">14:00 开抢</span>
                        <div class="product-name">MacBook Pro M3</div>
                        <div class="product-price">¥12999 <del>¥15999</del></div>
                        <button class="btn-seckill" onclick="seckill(2)">立即秒杀</button>
                    </div>
                </div>
                <div class="product-card">
                    <div class="product-img">🎧</div>
                    <div class="product-info">
                        <span class="seckill-tag">16:00 开抢</span>
                        <div class="product-name">AirPods Pro 2</div>
                        <div class="product-price">¥1499 <del>¥1999</del></div>
                        <button class="btn-seckill" onclick="seckill(3)">立即秒杀</button>
                    </div>
                </div>
                <div class="product-card">
                    <div class="product-img">⌚</div>
                    <div class="product-info">
                        <span class="seckill-tag">20:00 开抢</span>
                        <div class="product-name">Apple Watch S9</div>
                        <div class="product-price">¥2299 <del>¥2999</del></div>
                        <button class="btn-seckill" onclick="seckill(4)">立即秒杀</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p>© 2026 秒杀系统 - 高并发演示项目</p>
        </div>
    </div>

    <script>
        function seckill(productId) {
            alert('秒杀商品 ID: ' + productId + '\n（后端 API 待实现）');
        }
    </script>
</body>
</html>
