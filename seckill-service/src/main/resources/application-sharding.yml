server:
  port: 8086

spring:
  application:
    name: seckill-service

  # ShardingSphere-JDBC 分库分表数据源
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/flash_sale?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # Kafka 配置（替代 RabbitMQ）
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ======== ShardingSphere-JDBC 分库分表配置 ========
# 说明：
# 1. 4个分库 ds_0~ds_3，按用户ID后4位取模分库
# 2. 订单表按订单号中的用户基因（后4位）路由到不同数据库
# 3. 秒杀商品表按活动ID后2位取模分表（100张表）
sharding:
  datasource:
    names: ds_0,ds_1,ds_2,ds_3
    ds_0:
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/flash_sale_0?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
    ds_1:
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/flash_sale_1?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
    ds_2:
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/flash_sale_2?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
    ds_3:
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/flash_sale_3?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5

  tables:
    # 秒杀订单表按活动ID分库，按用户ID分表
    seckill_order:
      actual-data-nodes: ds_$->{0..3}.seckill_order_$->{0..99}
      database-strategy:
        standard:
          sharding-column: activity_id
          sharding-algorithm-name: activity_inline
      table-strategy:
        standard:
          sharding-column: user_id
          sharding-algorithm-name: user_inline

  binding-tables:
    - seckill_order

  sharding-algorithms:
    activity_inline:
      type: INLINE
      props:
        algorithm-expression: ds_$->{activity_id % 4}
    user_inline:
      type: INLINE
      props:
        algorithm-expression: seckill_order_$->{user_id % 100}

  default-database-strategy:
    standard:
      sharding-column: activity_id
      sharding-algorithm-name: activity_inline
