server:
  port: 8086

spring:
  application:
    name: seckill-service

  # ShardingSphere-JDBC 分库分表数据源
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:flash-sale-mysql-master}:3306/flash_sale?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:flash-sale-kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

  data:
    redis:
      host: ${REDIS_HOST:flash-sale-redis}
      port: ${REDIS_PORT:6379}

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
