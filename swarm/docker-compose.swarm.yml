version: "3.9"

services:
  seckill-service:
    image: seckill-service:latest
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=swarm
      - MYSQL_HOST=mysql
      - MYSQL_PASSWORD=123456
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redis123
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      healthcheck:
        test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
        interval: 30s
        timeout: 10s
        retries: 3
    networks:
      - flash-sale-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./front-end:/usr/share/nginx/html:ro
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    networks:
      - flash-sale-net

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=flash_sale
    volumes:
      - mysql-data:/var/lib/mysql
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - flash-sale-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly yes
      - --requirepass redis123
    volumes:
      - redis-data:/data
    deploy:
      replicas: 1
    networks:
      - flash-sale-net

networks:
  flash-sale-net:
    driver: overlay
    attachable: true

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
