version: "3.9"

services:
  gateway:
    image: flash-sale-gateway:latest
    ports:
      - "8080:8080"
    networks:
      - flash-sale-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure

  user-service:
    image: flash-sale-user-service:latest
    networks:
      - flash-sale-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
      restart_policy:
        condition: on-failure

  product-service:
    image: flash-sale-product-service:latest
    ports:
      - "8083:8083"
    networks:
      - flash-sale-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
      restart_policy:
        condition: on-failure

  order-service:
    image: flash-sale-order-service:latest
    ports:
      - "8085:8085"
    networks:
      - flash-sale-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
      restart_policy:
        condition: on-failure

  seckill-service:
    image: flash-sale-seckill-service:latest
    ports:
      - "8086:8086"
    networks:
      - flash-sale-net
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      healthcheck:
        test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
        interval: 30s
        timeout: 10s
        retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./front-end:/usr/share/nginx/html:ro
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - flash-sale-net

networks:
  flash-sale-net:
    driver: overlay
    attachable: true
