apiVersion: v1
kind: Namespace
metadata:
  name: flash-sale
---
# ========== ConfigMap ==========
apiVersion: v1
kind: ConfigMap
metadata:
  name: flash-sale-config
  namespace: flash-sale
data:
  MYSQL_HOST: "mysql-master"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "flash_sale"
  MYSQL_USERNAME: "root"
  MYSQL_PASSWORD: "123456"
  MYSQL_SLAVE_HOST: "mysql-slave"
  MYSQL_SLAVE_PORT: "3306"
  MYSQL_SLAVE_DATABASE: "flash_sale"
  MYSQL_SLAVE_USERNAME: "root"
  MYSQL_SLAVE_PASSWORD: "123456"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USERNAME: "guest"
  RABBITMQ_PASSWORD: "guest"
  ELASTICSEARCH_HOST: "elasticsearch"
  ELASTICSEARCH_PORT: "9200"
---
# ========== Secrets ==========
apiVersion: v1
kind: Secret
metadata:
  name: flash-sale-secret
  namespace: flash-sale
type: Opaque
stringData:
  MYSQL_PASSWORD: "123456"
  MYSQL_SLAVE_PASSWORD: "123456"
  RABBITMQ_PASSWORD: "guest"
