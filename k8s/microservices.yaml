---
# Seckill Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seckill-service
  namespace: flash-sale
spec:
  replicas: 3
  selector:
    matchLabels:
      app: seckill-service
  template:
    metadata:
      labels:
        app: seckill-service
    spec:
      containers:
      - name: seckill-service
        image: flash-sale-seckill-service:latest
        ports:
        - containerPort: 8086
        envFrom:
        - configMapRef:
            name: flash-sale-config
        - secretRef:
            name: flash-sale-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8086
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
