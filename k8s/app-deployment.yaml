apiVersion: apps/v1
kind: Deployment
metadata:
  name: seckill-service
  namespace: flash-sale
spec:
  replicas: 3
  selector:
    matchLabels:
      app: seckill-service
  template:
    metadata:
      labels:
        app: seckill-service
    spec:
      containers:
      - name: seckill-service
        image: seckill-service:latest
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: seckill-config
        - secretRef:
            name: seckill-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: seckill-service
  namespace: flash-sale
spec:
  selector:
    app: seckill-service
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
