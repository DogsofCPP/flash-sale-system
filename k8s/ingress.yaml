apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flash-sale-ingress
  namespace: flash-sale
spec:
  rules:
  - host: flash-sale.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
