events {
    worker_connections 1024;
}

http {
    # 后端服务组：多实例，用于负载均衡
    # 默认使用轮询（round-robin）；可改为 least_conn、ip_hash 等
    upstream backend {
        # 轮询（默认）：依次分配请求到 8081、8082
        server user-service-8081:8081;
        server user-service-8082:8082;
        # 可选：加权轮询
        # server user-service-8081:8081 weight=2;
        # server user-service-8082:8082 weight=1;
    }

    server {
        listen 80;
        server_name localhost;

        # 静态资源（HTML/CSS/JS/图片）直接由 Nginx 返回，不经过后端
        location / {
            root /usr/share/nginx/html;
            index sale.html;
            try_files $uri $uri/ /sale.html;
        }

        # API 请求转发到后端负载均衡组
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
