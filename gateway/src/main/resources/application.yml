server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # ========== 用户服务 ==========
        - id: user-service
          uri: http://user-service-1:8081
          predicates:
            - Path=/api/users/**

        # ========== 商品服务 ==========
        - id: product-service
          uri: http://product-service-1:8083
          predicates:
            - Path=/api/products/**

        # ========== 订单服务 ==========
        - id: order-service
          uri: http://order-service-1:8085
          predicates:
            - Path=/api/orders/**

        # ========== 秒杀服务 ==========
        - id: seckill-service
          uri: http://seckill-service-1:8086
          predicates:
            - Path=/api/seckill/**

        # ========== 搜索服务 ==========
        - id: search-service
          uri: http://product-service-1:8083
          predicates:
            - Path=/api/search/**

      # ========== 全局跨域配置 ==========
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600

      # ========== 默认过滤器 ==========
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
