# ======== ShardingSphere-JDBC 分库分表配置 ========
# order-service 分库分表规则：
# 1. 4个分库 flash_sale_order_0~flash_sale_order_3
# 2. 订单表 t_order 按订单号中的用户基因（后4位）分库
# 3. 订单表按年月分表（t_order_00~t_order_99，每年100张）
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/flash_sale_order?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.common
        spring.json.value.default.type: com.example.common.OrderMessage

sharding:
  datasource:
    names: ds_0,ds_1,ds_2,ds_3
    ds_0:
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/flash_sale_order_0?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
    ds_1:
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/flash_sale_order_1?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
    ds_2:
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/flash_sale_order_2?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
    ds_3:
      jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/flash_sale_order_3?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5

  tables:
    t_order:
      actual-data-nodes: ds_$->{0..3}.t_order_$->{00..99}
      database-strategy:
        standard:
          sharding-column: order_no
          sharding-algorithm-name: order_no_inline
      table-strategy:
        standard:
          sharding-column: order_no
          sharding-algorithm-name: order_no_table_inline

  binding-tables:
    - t_order

  sharding-algorithms:
    order_no_inline:
      type: INLINE
      props:
        algorithm-expression: ds_$->{Long.parseLong(orderNo.substring(17, 21)) % 4}
    order_no_table_inline:
      type: INLINE
      props:
        algorithm-expression: t_order_$->{Long.parseLong(orderNo.substring(2, 4)) % 100}

  default-database-strategy:
    standard:
      sharding-column: order_no
      sharding-algorithm-name: order_no_inline
