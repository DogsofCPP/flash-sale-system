<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册与登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.2s;
        }
        .tab:hover { color: #333; background: #f8f8f8; }
        .tab.active { color: #667eea; border-bottom: 2px solid #667eea; background: #fff; }
        .panel { display: none; padding: 32px; }
        .panel.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5568d3; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .message.show { display: block; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .welcome {
            margin-top: 20px;
            padding: 16px;
            background: #f0f4ff;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .welcome.show { display: block; }
        .welcome strong { color: #667eea; }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 24px;
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>秒杀系统 · 用户中心</h1>
        <div class="tabs">
            <div class="tab active" data-tab="login">登录</div>
            <div class="tab" data-tab="register">注册</div>
        </div>

        <div id="panel-login" class="panel active">
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
                <div id="loginMessage" class="message"></div>
            </form>
        </div>

        <div id="panel-register" class="panel">
            <form id="registerForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">注册</button>
                <div id="registerMessage" class="message"></div>
            </form>
        </div>

        <div id="welcome" class="welcome">
            欢迎，<strong id="welcomeUsername"></strong>
        </div>
    </div>

    <script>
        (function() {
            var apiBase = ''; // 相对路径，与当前页面同源（如 http://localhost:8081）

            function showMessage(elId, text, isError) {
                var el = document.getElementById(elId);
                el.textContent = text;
                el.className = 'message show ' + (isError ? 'error' : 'success');
            }
            function hideMessage(elId) {
                document.getElementById(elId).className = 'message';
            }

            document.querySelectorAll('.tab').forEach(function(tab) {
                tab.addEventListener('click', function() {
                    var t = this.getAttribute('data-tab');
                    document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
                    document.querySelectorAll('.panel').forEach(function(x) { x.classList.remove('active'); });
                    this.classList.add('active');
                    document.getElementById('panel-' + t).classList.add('active');
                    hideMessage('loginMessage');
                    hideMessage('registerMessage');
                });
            });

            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                var btn = document.getElementById('loginBtn');
                var msg = document.getElementById('loginMessage');
                var form = e.target;
                var username = form.username.value.trim();
                var password = form.password.value;
                if (!username || !password) {
                    showMessage('loginMessage', '请填写用户名和密码', true);
                    return;
                }
                btn.disabled = true;
                hideMessage('loginMessage');
                fetch(apiBase + '/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                })
                .then(function(res) {
                    if (res.ok) return res.json();
                    return res.text().then(function(t) {
                        try {
                            var errJson = JSON.parse(t);
                            throw new Error(errJson.message || t || '登录失败');
                        } catch (e) {
                            if (e instanceof SyntaxError) throw new Error(t || '登录失败');
                            throw e;
                        }
                    });
                })
                .then(function(user) {
                    window.location.href = '/sale.html';
                })
                .catch(function(err) {
                    showMessage('loginMessage', err.message || '登录失败，请检查用户名和密码', true);
                })
                .finally(function() { btn.disabled = false; });
            });

            // 注册表单
            document.getElementById('registerForm').addEventListener('submit', function(e) {
                .catch(function(err) {
                    showMessage('loginMessage', err.message || '登录失败，请检查用户名和密码', true);
                })
                .finally(function() { btn.disabled = false; });
            });

            document.getElementById('registerForm').addEventListener('submit', function(e) {
                e.preventDefault();
                var btn = document.getElementById('registerBtn');
                var form = e.target;
                var username = form.username.value.trim();
                var password = form.password.value;
                if (!username || !password) {
                    showMessage('registerMessage', '请填写用户名和密码', true);
                    return;
                }
                btn.disabled = true;
                hideMessage('registerMessage');
                fetch(apiBase + '/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                })
                .then(function(res) {
                    if (res.ok) return res.json();
                    return res.text().then(function(t) {
                        try {
                            var errJson = JSON.parse(t);
                            throw new Error(errJson.message || t || '注册失败');
                        } catch (e) {
                            if (e instanceof SyntaxError) throw new Error(t || '注册失败');
                            throw e;
                        }
                    });
                })
                .then(function(user) {
                    showMessage('registerMessage', '注册成功！用户 ID：' + (user.id || ''), false);
                    form.reset();
                })
                .catch(function(err) {
                    showMessage('registerMessage', err.message || '注册失败', true);
                })
                .finally(function() { btn.disabled = false; });
            });
        })();
    </script>
</body>
</html>
