<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒杀系统 - 用户中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2d2d5a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
            overflow: hidden;
            max-width: 460px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
        }
        .logo-section {
            text-align: center;
            padding: 40px 40px 30px;
            background: linear-gradient(135deg, rgba(233,69,96,0.2) 0%, rgba(255,107,107,0.1) 100%);
        }
        .logo { font-size: 48px; margin-bottom: 10px; }
        .logo-title { font-size: 24px; color: #fff; font-weight: 600; }
        .logo-sub { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 5px; }

        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tab {
            flex: 1;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            transition: all 0.3s;
            position: relative;
        }
        .tab:hover { color: rgba(255,255,255,0.8); }
        .tab.active {
            color: #e94560;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 3px 3px 0 0;
        }

        .panel { display: none; padding: 32px 40px 40px; }
        .panel.active { display: block; }

        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            font-size: 15px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            transition: all 0.3s;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 4px rgba(233,69,96,0.15);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.show { display: flex; align-items: center; gap: 10px; }
        .message.success {
            background: rgba(39,174,96,0.15);
            color: #27ae60;
            border: 1px solid rgba(39,174,96,0.3);
        }
        .message.error {
            background: rgba(231,76,60,0.15);
            color: #e74c3c;
            border: 1px solid rgba(231,76,60,0.3);
        }
        .message-icon { font-size: 20px; }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: rgba(255,255,255,0.3);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span { padding: 0 20px; font-size: 13px; }

        .tips {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-top: 20px;
        }

        .loading {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">🔥</div>
            <div class="logo-title">秒杀系统</div>
            <div class="logo-sub">高并发抢购平台</div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="login">登录</div>
            <div class="tab" data-tab="register">注册</div>
        </div>

        <!-- 登录表单 -->
        <div id="panel-login" class="panel active">
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrap">
                        <span class="icon">👤</span>
                        <input type="text" name="username" required placeholder="请输入用户名" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrap">
                        <span class="icon">🔒</span>
                        <input type="password" name="password" required placeholder="请输入密码" autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>登录</span>
                </button>
                <div id="loginMessage" class="message">
                    <span class="message-icon"></span>
                    <span class="message-text"></span>
                </div>
            </form>

            <div class="divider"><span>或者</span></div>

            <div class="tips">
                测试账号: <strong style="color:#e94560;">user1</strong> / <strong style="color:#e94560;">123456</strong>
            </div>
        </div>

        <!-- 注册表单 -->
        <div id="panel-register" class="panel">
            <form id="registerForm">
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrap">
                        <span class="icon">👤</span>
                        <input type="text" name="username" required placeholder="请输入用户名 (3-20位)" minlength="3" maxlength="20">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrap">
                        <span class="icon">🔒</span>
                        <input type="password" name="password" required placeholder="请输入密码 (6位以上)" minlength="6">
                    </div>
                </div>
                <div class="form-group">
                    <label>手机号 (选填)</label>
                    <div class="input-wrap">
                        <span class="icon">📱</span>
                        <input type="tel" name="phone" placeholder="请输入手机号">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <span>注册</span>
                </button>
                <div id="registerMessage" class="message">
                    <span class="message-icon"></span>
                    <span class="message-text"></span>
                </div>
            </form>

            <div class="tips">
                注册即表示同意 <a href="#" style="color:#e94560;">《用户协议》</a> 和 <a href="#" style="color:#e94560;">《隐私政策》</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const API_BASE = '/api';

            // Tab切换
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const t = this.getAttribute('data-tab');
                    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('panel-' + t).classList.add('active');
                });
            });

            // 显示消息
            function showMessage(elId, text, isError) {
                const el = document.getElementById(elId);
                el.querySelector('.message-icon').textContent = isError ? '✕' : '✓';
                el.querySelector('.message-text').textContent = text;
                el.className = 'message show ' + (isError ? 'error' : 'success');
            }

            function hideMessage(elId) {
                document.getElementById(elId).className = 'message';
            }

            // 设置按钮状态
            function setLoading(btn, loading, text) {
                btn.disabled = loading;
                btn.querySelector('span').innerHTML = loading ?
                    '<div class="loading"></div>' : text;
            }

            // 登录
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const btn = document.getElementById('loginBtn');
                const username = this.username.value.trim();
                const password = this.password.value;

                if (!username || !password) {
                    showMessage('loginMessage', '请填写用户名和密码', true);
                    return;
                }

                setLoading(btn, true, '登录中...');
                hideMessage('loginMessage');

                try {
                    const res = await fetch(API_BASE + '/users/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });

                    const data = await res.json();

                    if (data.code === 200) {
                        // 保存用户信息
                        localStorage.setItem('user', JSON.stringify(data.data));
                        showMessage('loginMessage', '登录成功，跳转中...', false);
                        setTimeout(() => { window.location.href = '/sale.html'; }, 1000);
                    } else {
                        showMessage('loginMessage', data.message || '用户名或密码错误', true);
                        setLoading(btn, false, '登录');
                    }
                } catch (err) {
                    showMessage('loginMessage', '网络错误，请检查服务是否启动', true);
                    setLoading(btn, false, '登录');
                }
            });

            // 注册
            document.getElementById('registerForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const btn = document.getElementById('registerBtn');
                const username = this.username.value.trim();
                const password = this.password.value;
                const phone = this.phone.value.trim();

                if (username.length < 3) {
                    showMessage('registerMessage', '用户名至少3位', true);
                    return;
                }
                if (password.length < 6) {
                    showMessage('registerMessage', '密码至少6位', true);
                    return;
                }

                setLoading(btn, true, '注册中...');
                hideMessage('registerMessage');

                try {
                    const res = await fetch(API_BASE + '/users/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, phone })
                    });

                    const data = await res.json();

                    if (data.code === 200) {
                        showMessage('registerMessage', '注册成功！请登录', false);
                        this.reset();
                        setTimeout(() => {
                            document.querySelector('.tab[data-tab="login"]').click();
                            // 自动填充用户名
                            document.querySelector('#loginForm input[name="username"]').value = username;
                        }, 1500);
                    } else {
                        showMessage('registerMessage', data.message || '注册失败', true);
                    }
                } catch (err) {
                    showMessage('registerMessage', '网络错误，请稍后重试', true);
                } finally {
                    setLoading(btn, false, '注册');
                }
            });
        })();
    </script>
</body>
</html>
